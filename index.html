<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exhibition Face Lock</title>
    <style>
        body {
            background-color: #0f172a;
            color: #38bdf8;
            font-family: 'Segoe UI', system-ui, sans-serif;
            text-align: center;
            margin-top: 20px;
        }
        #webcam-container {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 320px;
            height: 240px;
            border: 2px solid #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }
        .btn {
            background: #0e4429;
            color: #38bdf8;
            border: 1px solid #38bdf8;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background: #2ea043;
            color: #ffffff;
            box-shadow: 0 0 10px #38bdf8;
        }
        #label-container {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <h1>Face Detection System</h1>
    <p>Hosted via GitHub Pages (HTTPS)</p>
    
    <button class="btn" type="button" onclick="init()">Start Camera & Load Model</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script>
        const ESP32_IP = "192.168.4.1";
        const URL = "./model/";

        let model, webcam, labelContainer, maxPredictions;
        let isTriggered = false;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(320, 240, flip);
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            
            // Create a div for each trained class dynamically
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            // Loop through all trained classes (e.g., 0 = "Me", 1 = "Not Me", 2 = "No Match")
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                
                // Multiply probability by 100 to get a whole percentage number
                const percentage = Math.round(prediction[i].probability * 100);
                
                labelContainer.childNodes[i].innerHTML = `${className}: ${percentage}%`;

                // Add condition checks to your active class (e.g., if the first class is "Me")
                if (prediction[0].className === "Me" && prediction[0].probability > 0.85) {
                    if (!isTriggered) {
                        isTriggered = true;
                        triggerServo();
                    }
                } else {
                    isTriggered = false;
                }
            }
        }

        function triggerServo() {
            const url = `http://${ESP32_IP}/open`;
            console.log("Sending request to: " + url);

            fetch(url, { mode: 'no-cors' })
                .then(() => {
                    console.log("Signal sent successfully.");
                })
                .catch(err => {
                    console.error("Connection error: ", err);
                });
        }
    </script>
</body>
</html>
